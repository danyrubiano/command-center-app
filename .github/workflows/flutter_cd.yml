name: Flutter CD Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write # Needed for uploading releases

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Package macOS App
        run: |
          cd build/macos/Build/Products/Release
          # Compress whichever .app file was generated by the build
          zip -q -r command_center_macos_build.zip *.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Automated Release v1.0.${{ github.run_number }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: build/macos/Build/Products/Release/command_center_macos_build.zip
